# /etc/nginx/sites-available/signet
#
# Single-droplet setup: Nginx serves the static Vite build and proxies
# /api + /ws to the bridge running on 127.0.0.1:8787.
#
# 1) build the frontend:      cd web && npm ci && npm run build
#    -> outputs to web/dist
# 2) copy dist somewhere Nginx can read, e.g. /var/www/signet
# 3) symlink this file into sites-enabled and reload nginx
#
# Replace SERVER_NAME with your domain or droplet IP.

server {
    listen 80;
    server_name SERVER_NAME;

    root /var/www/signet;
    index index.html;

    # Static assets — long cache, they are content-hashed by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # REST actions → bridge
    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # session/init can take ~15s (deploy + mesh); don't cut it off
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # WebSocket live event stream → bridge
    location /ws {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 1d;   # keep the socket open
        proxy_send_timeout 1d;
    }

    # SPA fallback — every other path returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
